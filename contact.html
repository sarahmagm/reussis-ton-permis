<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Réussis Ton Permis</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{ --ink:#1E2A3A; --coral:#FF6B4A; --grey:#8D899E; --paper:#FAF9F7; }
  *{ box-sizing:border-box; }
  body{ margin:0; background: var(--paper); color: var(--ink); font-family:'Inter', sans-serif; }
  header{ padding: 22px 6vw; }
  .logo{ max-width:600px; margin:0 auto; display:flex; align-items:center; gap:9px; text-decoration:none; font-family:'Urbanist'; font-weight:800; font-size:18px; color:var(--ink); width:fit-content; }
  main{ max-width:600px; margin:0 auto; padding: 30px 6vw 70px; }
  h1{ font-family:'Urbanist'; font-weight:800; font-size:30px; margin-bottom:14px; }
  p.subtitle{ font-size:15px; color: var(--grey); line-height:1.6; margin-bottom:34px; }
  .card{ background:white; border-radius:20px; padding:28px; box-shadow: 0 12px 30px rgba(30,42,58,0.08); }
  .card p{ font-size:15px; line-height:1.6; margin:0 0 16px; }
  .email-row{ background: var(--paper); border-radius:12px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; font-size:14.5px; }
  .email-row a{ color: var(--coral); font-weight:700; text-decoration:none; }
  footer{ background: var(--ink); color: rgba(255,255,255,0.5); padding: 30px 6vw; font-size:12px; text-align:center; }
</style>
</head>
<body>
<header>
  <a href="/" class="logo">
    <svg width="26" height="26" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="#1E2A3A"/><path d="M16 40 L24 32 L16 24" fill="none" stroke="#FF6B4A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/><path d="M27 44 L37 32 L27 20" fill="none" stroke="#FF6B4A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/><path d="M40 48 L52 32 L40 16" fill="none" stroke="#FF6B4A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Réussis Ton Permis
  </a>
</header>
<main>
  <h1>Contact</h1>
  <p class="subtitle">Une question, une remarque, un bon plan à nous signaler ? Écris-nous directement.</p>
  <div class="card">
    <p>Le moyen le plus simple de nous joindre :</p>
    <div class="email-row">
      <span>contact@reussis-ton-permis.fr</span>
      <a href="mailto:contact@reussis-ton-permis.fr">Envoyer un email</a>
    </div>
  </div>
</main>
<footer>© 2026 Réussis Ton Permis</footer>
</body>
</html>
